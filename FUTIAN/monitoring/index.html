<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUTIAN Chatbot Monitoring Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard-container">
        <header class="top-nav">
            <div class="logo-group">
                <img src="../front-end/Futia_LogoX.png" alt="FUTIAN Logo" class="logo-img">
                <div class="logo-text">
                    <h2>FUTIAN Monitor</h2>
                    <span class="page-label">Dashboard</span>
                </div>
            </div>
            <div class="nav-actions">
                <button id="theme-toggle-btn" class="btn btn-outline">Dark Mode</button>
            </div>
        </header>

        <main class="main-content">
            <header class="page-header">
                <h1>Monitoring Overview</h1>
                <div class="header-actions">
                    <button id="refresh-btn" class="btn btn-primary">Refresh Data</button>
                </div>
            </header>

            <section class="stats-grid">
                <div class="stat-card">
                    <h3>Total Messages</h3>
                    <p id="total-messages">0</p>
                </div>
                <div class="stat-card">
                    <h3>User Messages</h3>
                    <p id="user-messages">0</p>
                </div>
                <div class="stat-card">
                    <h3>Bot Messages</h3>
                    <p id="bot-messages">0</p>
                </div>
                <div class="stat-card">
                    <h3>Unique IPs</h3>
                    <p id="total-users">0</p>
                </div>
            </section>

            <section class="controls-bar">
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Search messages or IP...">
                </div>
                <div class="sort-box">
                    <select id="sort-select">
                        <option value="newest">Newest First</option>
                        <option value="oldest">Oldest First</option>
                    </select>
                </div>
            </section>

            <section class="table-container">
                <table id="messages-table">
                    <thead>
                        <tr>
                            <th>Date & Time</th>
                            <th>Role</th>
                            <th>Message</th>
                            <th>IP Address</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Rows will go here -->
                        <tr><td colspan="4" class="text-center">Loading messages...</td></tr>
                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
